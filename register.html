<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Konto erstellen</title>
  <link rel="stylesheet" href="css/design.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body>
  <main class="page">
    <form id="registerForm" class="card">
      <a class="close" href="login.html">×</a>
      <h1>Konto<br>erstellen</h1>
      <input id="name" type="text" placeholder="Name" required>
      <input id="email" type="email" placeholder="E-Mail" required>
      <input id="password" type="password" placeholder="Passwort" required>
      <button>Konto erstellen</button>
    </form>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
